<header class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-2">
  <div class="container">
    <!-- Logo/Brand (Left Side) -->
    <a routerLink="/" class="navbar-brand d-flex align-items-center text-decoration-none">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#e30613" class="bi bi-bus-front me-2" viewBox="0 0 16 16">
        <path d="M5 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0m8 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0m-6-1a1 1 0 1 0 0 2h2a1 1 0 1 0 0-2zM4 2a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm0-1h8a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H4a3 3 0 0 1-3-3V4a3 3 0 0 1 3-3"/>
      </svg>
      <span class="fs-4 fw-bold" style="color: #e30613;">TunisiaBus</span>
    </a>

    <!-- Navbar Toggler Button for Mobile -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navigation Links (Collapsed on Mobile) -->
    <div class="collapse navbar-collapse justify-content-start" id="mainNavbar">
      <ul class="navbar-nav align-items-center">
        <!-- Admin Link (If Admin) -->
        <li class="nav-item mx-1" *ngIf="isAdmin">
          <a routerLink="/admin" class="nav-link position-relative px-3 py-2 d-flex align-items-center">
            <i class="bi bi-shield-lock me-2"></i>
            <span class="fw-medium">Admin</span>
          </a>
        </li>

        <!-- Main Nav Items -->
        <li class="nav-item mx-1">
          <a routerLink="/" class="nav-link position-relative px-3 py-2 d-flex align-items-center">
            <i class="bi bi-house-door me-2"></i>
            <span class="fw-medium">Home</span>
          </a>
        </li>
        <li class="nav-item mx-1">
          <a routerLink="/routes" class="nav-link position-relative px-3 py-2 d-flex align-items-center">
            <i class="bi bi-geo-alt me-2"></i>
            <span class="fw-medium">Routes</span>
          </a>
        </li>
        <li class="nav-item mx-1">
          <a routerLink="/schedule" class="nav-link position-relative px-3 py-2 d-flex align-items-center">
            <i class="bi bi-clock me-2"></i>
            <span class="fw-medium">Schedule</span>
          </a>
        </li>

        <!-- Help Dropdown -->
        <li class="nav-item dropdown mx-1">
          <a class="nav-link px-3 py-2 d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-info-circle me-2"></i>
            <span class="fw-medium">Help</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm mt-1">
            <li><a class="dropdown-item py-2 px-3" href="#">FAQs</a></li>
            <li><a class="dropdown-item py-2 px-3" href="#">Contact</a></li>
            <li><hr class="dropdown-divider mx-3 my-1"></li>
            <li><a class="dropdown-item py-2 px-3" href="#">About Us</a></li>
          </ul>
        </li>

        <!-- Profile Dropdown (If Logged In) -->
        <li class="nav-item" *ngIf="isLoggedIn">
          <app-profile-dropdown></app-profile-dropdown>
        </li>

        <!-- Auth Buttons (If Not Logged In) -->
        <li class="nav-item ms-3" *ngIf="!isLoggedIn">
          <div class="d-flex gap-2">
            <a routerLink="/login" class="btn btn-outline-danger btn-sm px-3 fw-medium d-flex align-items-center">
              <i class="bi bi-box-arrow-in-right me-2"></i>
              Login
            </a>
            <a routerLink="/signup" class="btn btn-danger btn-sm px-3 fw-medium d-flex align-items-center">
              <i class="bi bi-person-plus me-2"></i>
              Sign Up
            </a>
          </div>
        </li>
      </ul>
    </div>
  </div>
</header>

<!-- Bootstrap JS Bundle (Including Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

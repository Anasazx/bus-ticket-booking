<section class="vh-100" style="margin-bottom: 10%; margin-top: 5px;">
  <div class="mask d-flex align-items-center h-100">
    <div class="container h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
          <div class="card" style="border-radius: 15px;">
            <div class="card-body p-5">
              <h2 class="text-uppercase text-center mb-5">Log into your account</h2>

              <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <!-- Email Input -->
                <div class="form-outline mb-4">
                  <input 
                    formControlName="email"
                    type="email" 
                    id="form3Example3cg" 
                    class="form-control form-control-lg" 
                    [class.is-invalid]="email.touched && email.invalid" 
                  />
                  <label class="form-label" for="form3Example3cg">Your Email</label>
                  <div *ngIf="email.touched && email.invalid" class="invalid-feedback">
                    Please enter a valid email.
                  </div>
                </div>

                <!-- Password Input -->
                <div class="form-outline mb-4">
                  <input 
                    formControlName="password"
                    type="password" 
                    id="form3Example4cg" 
                    class="form-control form-control-lg" 
                    [class.is-invalid]="password.touched && password.invalid" 
                  />
                  <label class="form-label" for="form3Example4cg">Your Password</label>
                  <div *ngIf="password.touched && password.invalid" class="invalid-feedback">
                    Password is required and should be at least 8 characters long.
                  </div>
                </div>

                <!-- Login Button -->
                <div class="d-flex justify-content-center">
                  <button class="btn btn-danger fs-4 fw-normal align-items-center" type="submit" [disabled]="isLoading()">
                    Login
                  </button>
                </div>

                <!-- Error Message -->
                <div *ngIf="errorMessage()" class="alert alert-danger mt-3 text-center">
                  {{ errorMessage() }}
                </div>

                <!-- Redirect to Sign Up -->
                <p class="text-center text-muted mt-5 mb-0">
                  Don't have an account? 
                  <a (click)="scrollToTop()" routerLink="/signup" class="fw-bold text-body">
                    <u>Sign up here</u>
                  </a>
                </p>

              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

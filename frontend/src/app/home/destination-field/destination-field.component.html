<div class="container mt-4">
    <div class="bg-white p-3 rounded-3 shadow-sm">
      <div class="row g-3 align-items-center">
        
        <!-- Departure -->
        <div class="col-12 col-md-3">
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0">
              <i class="bi bi-geo-alt text-muted"></i>
            </span>
            <select [(ngModel)]="departure" class="form-select border-start-0 ps-0" style="border-color: #e9ecef;">
              <option value="" selected disabled hidden>Departure</option>
              @for (city of departureCities; track city) {
                <option [value]="city">{{city}}</option>
              }
            </select>
          </div>
        </div>
  
        <!-- Destination -->
        <div class="col-12 col-md-3">
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0">
              <i class="bi bi-geo-alt-fill text-muted"></i>
            </span>
            <select [(ngModel)]="destination" class="form-select border-start-0 ps-0" style="border-color: #e9ecef;">
              <option value="" selected disabled hidden>Destination</option>
              @for (city of destinationCities; track city) {
                <option [value]="city">{{city}}</option>
              }
            </select>
          </div>
        </div>
  
        <!-- Date -->
        <div class="col-12 col-md-3">
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0">
              <i class="bi bi-calendar3 text-muted"></i>
            </span>
            <input type="date" [(ngModel)]="date" class="form-control border-start-0 ps-0" style="border-color: #e9ecef;">
          </div>
        </div>
  
        <!-- Search Button -->
        <div class="col-12 col-md-3 d-grid">
          <button
            class="btn btn-primary rounded-3 fw-medium px-4 py-2"
            style="background-color: #dc3545; border: none;"
            (click)="onSearch()"
          >
            <i class="bi bi-search me-2"></i>
            <span>Search Buses</span>
          </button>
        </div>
  
      </div>
    </div>
  </div>

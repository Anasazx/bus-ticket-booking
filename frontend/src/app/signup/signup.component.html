
<section class="vh-100 mt-5 " style="margin-bottom: 10%; margin-top: 5px;">
  <div class="mask d-flex align-items-center h-100">
    <div class="container h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
          <div class="card" style="border-radius: 15px;">
            <div class="card-body p-5">
              <h2 class="text-uppercase text-center mb-5">Create an account</h2>

              <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

                <div class="form-outline mb-4">
                  <input formControlName="firstname" type="text" class="form-control form-control-lg" />
                  <label class="form-label">Your First Name</label>
                </div>

                <div class="form-outline mb-4">
                  <input formControlName="lastname" type="text" class="form-control form-control-lg" />
                  <label class="form-label">Your Last Name</label>
                </div>
              
                <div class="form-outline mb-4">
                  <input formControlName="email" type="email" class="form-control form-control-lg" />
                  <label class="form-label">Your Email</label>
                </div>
              
                <div class="form-outline mb-4">
                  <input formControlName="password" type="password" class="form-control form-control-lg" />
                  <label class="form-label">Password</label>
                </div>
              
                <div class="form-outline mb-4">
                  <input formControlName="confirmPassword" type="password" class="form-control form-control-lg" />
                  <label class="form-label">Repeat your password</label>
                </div>
              
                <div class="form-check d-flex justify-content-center mb-5">
                  <input formControlName="agreeTerms" class="form-check-input me-2" type="checkbox" />
                  <label class="form-check-label">
                    I agree all statements in <a href="#!" class="text-body"><u>Terms of service</u></a>
                  </label>
                </div>
              
                <div class="d-flex justify-content-center">
                  <button class="btn btn-danger fs-4 fw-normal align-items-center" type="submit">
                    Register
                  </button>
                </div>
              
                <p class="text-center text-muted mt-5 mb-0">
                  Have already an account? 
                  <a class="fw-bold text-body" routerLink="/login" (click)="scrollToTop()"><u>Login here</u></a>
                </p>
              
                <div *ngIf="errorMessage" class="alert alert-danger mt-3 text-center">
                  {{ errorMessage }}
                </div>
              </form>
              

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
